name: orz-people-platform-test

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: orz_people_test
      POSTGRES_USER: orz_test
      POSTGRES_PASSWORD: orz_test
    ports:
      - '${TEST_POSTGRES_PORT:-55432}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U orz_test -d orz_people_test']
      interval: 2s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7.4-alpine
    ports:
      - '${TEST_REDIS_PORT:-56379}:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 2s
      timeout: 3s
      retries: 20
