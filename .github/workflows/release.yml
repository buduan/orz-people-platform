name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Verify and build release artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Check out the tagged revision
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is based on main
        run: |
          git fetch origin main:refs/remotes/origin/main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm typecheck

      - name: Build workspace
        run: pnpm build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-${{ github.ref_name }}
          path: app/frontend/.output
          if-no-files-found: error

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-${{ github.ref_name }}
          path: app/backend/dist
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-${{ github.ref_name }}
          path: frontend

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-${{ github.ref_name }}
          path: backend

      - name: Archive frontend
        run: tar -czf frontend-${{ github.ref_name }}.tar.gz -C frontend .

      - name: Archive backend
        run: tar -czf backend-${{ github.ref_name }}.tar.gz -C backend .

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            frontend-${{ github.ref_name }}.tar.gz
            backend-${{ github.ref_name }}.tar.gz

  backend-image:
    name: Publish backend runtime image
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check out the tagged revision
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/orz-people-platform-backend
          tags: |
            type=ref,event=tag
            type=sha

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: app/backend/Dockerfile
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
