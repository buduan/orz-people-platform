name: Update API Docs & Deploy Swagger UI

on:
  push:
    branches:
      - main
      - master
    paths:
      - app/backend/src/**
      - app/backend/api/**
      - app/backend/prisma/schema.prisma
      - scripts/update-openapi-from-commit.mjs
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: api-docs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Update OpenAPI and deploy Swagger UI
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: changed_paths
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "openapi_source_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base="${{ github.event.before }}"
          if [[ -z "$base" || "$base" == "0000000000000000000000000000000000000000" ]]; then
            git diff-tree --no-commit-id --name-only -r "${{ github.sha }}" > changed-files.txt
          else
            git diff --name-only "$base" "${{ github.sha }}" > changed-files.txt
          fi

          if grep -q '^app/backend/src/' changed-files.txt \
            || grep -q '^app/backend/prisma/schema\.prisma$' changed-files.txt \
            || grep -q '^scripts/update-openapi-from-commit\.mjs$' changed-files.txt; then
            echo "openapi_source_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "openapi_source_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        if: steps.changed_paths.outputs.openapi_source_changed == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - name: Setup Node.js
        if: steps.changed_paths.outputs.openapi_source_changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        if: steps.changed_paths.outputs.openapi_source_changed == 'true'
        run: pnpm install --frozen-lockfile

      - name: Update app/backend/api/openapi.yml with AI
        if: >-
          steps.changed_paths.outputs.openapi_source_changed == 'true' &&
          vars.CI_AI_API_URL != '' &&
          vars.CI_AI_MODEL != '' &&
          secrets.CI_AI_API_KEY != ''
        env:
          CI_AI_API_URL: ${{ vars.CI_AI_API_URL }}
          CI_AI_API_KEY: ${{ secrets.CI_AI_API_KEY }}
          CI_AI_MODEL: ${{ vars.CI_AI_MODEL }}
        run: node scripts/update-openapi-from-commit.mjs

      - name: Explain skipped AI update
        if: >-
          steps.changed_paths.outputs.openapi_source_changed == 'true' &&
          (vars.CI_AI_API_URL == '' || vars.CI_AI_MODEL == '' || secrets.CI_AI_API_KEY == '')
        run: |
          echo "::warning::OpenAPI AI update was skipped. Configure CI_AI_API_URL and CI_AI_MODEL as repository variables, and CI_AI_API_KEY as a repository secret."

      - name: Detect OpenAPI changes
        id: openapi_changes
        if: steps.changed_paths.outputs.openapi_source_changed == 'true'
        run: |
          if git diff --quiet -- app/backend/api/openapi.yml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated OpenAPI spec
        if: steps.changed_paths.outputs.openapi_source_changed == 'true' && steps.openapi_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/backend/api/openapi.yml
          git commit -m "chore(api): update OpenAPI spec"
          git push

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload API docs artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./app/backend/api

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
